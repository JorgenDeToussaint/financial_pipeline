name: Financial Pipeline CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing
        continue-on-error: true  

  docker-build:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t financial-pipeline:latest .

      - name: Test Docker image imports
        run: |
          docker run --rm financial-pipeline:latest python -c "import src; print('✓ Import successful')"

  integration-test:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    env:
      MINIO_USER: ${{ secrets.MINIO_USER }}
      MINIO_PASSWORD: ${{ secrets.MINIO_PASSWORD }}
      NBP_API_VERSION: v1
      LOG_LEVEL: INFO
      ENV: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "MINIO_USER=${MINIO_USER}" >> .env
          echo "MINIO_PASSWORD=${MINIO_PASSWORD}" >> .env

      - name: Start MinIO service
        run: |
          docker compose up -d minio
          echo "Waiting for MinIO..."

      - name: Run pipeline
        run: |
          docker compose up --build --abort-on-container-exit app
        timeout-minutes: 15

      - name: Show pipeline logs
        if: always()
        run: |
          echo "=== Application Logs ==="
          docker compose logs app
          echo "=== MinIO Logs ==="
          docker compose logs minio

      - name: Cleanup containers
        if: always()
        run: |
          docker compose down -v
          docker system prune -af --volumes
