name: Data Pipeline Production

on: [push]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    services:
      minio:
        image: minio/minio
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
        options: --entrypoint "sh" -c "minio server /data"

    steps:
      - uses: actions/checkout@v4

      - name: Build and Run Container
        env:
          S3_ACCESS_KEY: ${{ secrets.MINIO_USER }}
          S3_SECRET_KEY: ${{ secrets.MINIO_PASSWORD }}
          S3_ENDPOINT: "http://minio:9000"
        run: |
          docker build -t data-loader -f docker/Dockerfile .
          
          docker run \
            --network host \
            --add-host=minio:127.0.0.1 \
            -e S3_ACCESS_KEY=${{ env.S3_ACCESS_KEY }} \
            -e S3_SECRET_KEY=${{ env.S3_SECRET_KEY }} \
            -e S3_ENDPOINT=${{ env.S3_ENDPOINT }} \
            data-loader