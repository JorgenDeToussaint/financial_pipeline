name: Financial Pipeline CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t financial-pipeline:latest .

      - name: Test Docker image imports
        run: |
          docker run --rm financial-pipeline:latest python -c "import src; print('✓ Import successful')"

  integration-test:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    env:
      MINIO_USER: ${{ secrets.MINIO_USER }}
      MINIO_PASSWORD: ${{ secrets.MINIO_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Secrets Presence
        run: |
          if [ -z "$MINIO_USER" ]; then 
            exit 1 
          fi

      - name: Start Infrastructure
        run: |
          docker compose up -d minio
          timeout 60 bash -c 'until [ "$(docker inspect -f {{.State.Health.Status}} minio_storage)" == "healthy" ]; do sleep 2; done'
          docker compose up createbuckets

      - name: Run Pipeline
        run: |
          docker compose up --build --abort-on-container-exit app
        timeout-minutes: 10

      - name: Show Debug Logs
        if: always()
        run: |
          docker compose logs app
          docker compose logs minio

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
          docker system prune -af --volumes