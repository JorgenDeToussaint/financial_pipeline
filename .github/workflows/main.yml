name: Data Pipeline Production

on: [push]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO Server
        run: |
          docker run -d -p 9000:9000 --name minio \
            -e "MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}" \
            -e "MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}" \
            minio/minio server /data &
          
          # Czekamy chwilę, aż system wstanie (Healthcheck)
          sleep 5

      - name: Build and Run Loader
        env:
          S3_ACCESS_KEY: ${{ secrets.MINIO_ROOT_USER }}
          S3_SECRET_KEY: ${{ secrets.MINIO_ROOT_PASSWORD }}
          S3_ENDPOINT: "http://localhost:9000"
        run: |
          docker build -t data-loader -f docker/Dockerfile .
          
          docker run \
            --network host \
            -e S3_ACCESS_KEY=${{ env.S3_ACCESS_KEY }} \
            -e S3_SECRET_KEY=${{ env.S3_SECRET_KEY }} \
            -e S3_ENDPOINT=${{ env.S3_ENDPOINT }} \
            data-loader