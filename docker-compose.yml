services:
  app:
    init: true
    build:
      context: .
      dockerfile: docker/Dockerfile
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M
    environment:
      - PYTHONPATH=/app
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_USER}
      - S3_SECRET_KEY=${MINIO_PASSWORD}
    depends_on:
      createbuckets:
        condition: service_completed_successfully

  streamlit:
    init: true
    build:
      context: .
      dockerfile: docker/Dockerfile
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M
    volumes:
      - ./dashboard:/app/dashboard:z
      - ./config:/app/config:z
    working_dir: /app
    command: >
      streamlit run dashboard/app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.fileWatcherType=none
    ports:
      - "8502:8501"
    environment:
      - PYTHONPATH=/app
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_USER}
      - S3_SECRET_KEY=${MINIO_PASSWORD}
    depends_on:
      createbuckets:
        condition: service_completed_successfully
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: minio_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_USER=${MINIO_USER}
      - MINIO_PASSWORD=${MINIO_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local_minio http://minio:9000 $${MINIO_USER} $${MINIO_PASSWORD};
      /usr/bin/mc mb --ignore-existing local_minio/bronze;
      /usr/bin/mc mb --ignore-existing local_minio/silver;
      /usr/bin/mc mb --ignore-existing local_minio/gold;
      exit 0;
      "

volumes:
  minio_data: